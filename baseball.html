<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>野球部管理システム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Bebas+Neue&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f2f5;--sur:#fff;--sur2:#f7f8fa;--bdr:#d0d8e4;--red:#c0392b;--redd:#a93226;--acc:#d35400;--txt:#1a2535;--mut:#6b7a8d;--dim:#a0aab4;--grn:#1e8449;--blu:#1a5276;--pur:#6c3483;--head:#1a2535}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Noto Sans JP',sans-serif;min-height:100vh;font-size:15px}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#e8edf3}::-webkit-scrollbar-thumb{background:#b0bcc8;border-radius:3px}
input,select,textarea{background:#fff;color:var(--txt);border:1.5px solid var(--bdr);border-radius:7px;padding:9px 12px;font-family:inherit;font-size:14px;outline:none;width:100%;transition:border .15s;box-shadow:0 1px 3px rgba(0,0,0,.06)}
input:focus,select:focus,textarea:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(192,57,43,.12)}
select option{background:#fff;color:var(--txt)}textarea{resize:vertical;min-height:60px}
button{cursor:pointer;font-family:inherit;border:none;outline:none;transition:all .15s}
.btn{border-radius:8px;font-weight:700;padding:10px 20px;font-size:14px}.btn:active{transform:scale(.97)}
.btn-p{background:linear-gradient(135deg,var(--red),var(--redd));color:#fff;box-shadow:0 2px 8px rgba(192,57,43,.3)}.btn-p:hover{filter:brightness(1.08)}
.btn-p:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
.btn-g{background:#fff;color:var(--mut);border:1.5px solid var(--bdr);box-shadow:0 1px 3px rgba(0,0,0,.06)}.btn-g:hover{border-color:var(--red);color:var(--red)}
.btn-sm{padding:7px 14px;font-size:13px}
.btn-ic{background:transparent;padding:5px 8px;border-radius:6px;color:var(--mut);font-size:15px}.btn-ic:hover{background:#f0f2f5;color:var(--txt)}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.overlay{position:fixed;inset:0;background:rgba(10,18,30,.7);display:flex;align-items:center;justify-content:center;z-index:500;padding:12px}
.modal{background:#fff;border:1px solid var(--bdr);border-radius:16px;width:100%;max-width:520px;padding:28px;max-height:94vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.tag{display:inline-block;padding:3px 10px;border-radius:5px;font-size:12px;font-weight:700}
.row-h{transition:background .1s}.row-h:hover{background:#f7f8fa}
.lbl{display:block;font-size:12px;color:var(--mut);margin-bottom:5px;font-weight:700}
.pill{border-radius:20px;padding:6px 14px;font-size:13px;font-weight:700;border:1.5px solid var(--bdr);cursor:pointer;background:#fff;color:var(--mut)}
.pill.on{background:var(--red);color:#fff;border-color:var(--red)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g-full{grid-column:1/-1}
th,td{padding:10px 12px;text-align:left}
th{font-size:11px;font-weight:700;color:var(--mut);background:#f7f8fa}
table{border-collapse:collapse;width:100%}
thead tr{border-bottom:2px solid var(--red)}
tr.row-h td{border-bottom:1px solid #edf0f4}
.notice{background:#f7f8fa;border:1.5px dashed #c8d0da;border-radius:10px;padding:36px;text-align:center;color:var(--mut)}
.tabs{display:flex;gap:2px;border-bottom:2px solid #e0e6ed;margin-bottom:18px}
.tab-btn{padding:10px 18px;background:transparent;color:var(--mut);border:none;border-bottom:3px solid transparent;cursor:pointer;font-size:14px;font-weight:700;transition:all .15s;margin-bottom:-2px}
.tab-btn.on{color:var(--red);border-bottom-color:var(--red)}
.sbo-dot{width:16px;height:16px;border-radius:50%;border:2px solid #ccd4de;display:inline-block;margin:2px}
.sbo-dot.ball{background:var(--grn);border-color:var(--grn)}
.sbo-dot.strike{background:var(--red);border-color:var(--red)}
.sbo-dot.out{background:var(--acc);border-color:var(--acc)}
.ab-cell{width:62px;height:64px;cursor:pointer;border:1.5px solid #ccd4de;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;background:#f7f8fa;transition:all .12s}
.ab-cell:hover{border-color:var(--acc);background:#fff8f0}
.ab-cell.filled{border-color:#8fa0b4;background:#fff}
.ab-code{font-size:10px;font-weight:700;color:var(--txt);line-height:1}
.ab-bs{font-size:9px;color:var(--mut)}
.score-grid{overflow-x:auto}
.score-grid table{min-width:700px}
.score-grid td,.score-grid th{padding:4px;text-align:center;border:1px solid #d8e0ea}
.inn-score{font-family:'Bebas Neue';font-size:18px}
.kbd{display:inline-block;background:#e8edf3;border:1px solid #c0cad4;border-radius:4px;padding:2px 7px;font-size:12px;font-family:monospace}
</style>
</head>
<body>
<div id="app"></div>
<script>
const POS=["投手","捕手","内野手","外野手","控え"];
const SUBPOS=["投手","捕手","一塁手","二塁手","三塁手","遊撃手","左翼手","中堅手","右翼手","指名打者"];
const GRADES=["1年","2年","3年","社会人","OB"];
const GTYPE=["練習試合","公式戦","練習","合宿","その他"];
const PPOS={"投手":"P","捕手":"C","内野手":"IF","外野手":"OF","一塁手":"1B","二塁手":"2B","三塁手":"3B","遊撃手":"SS","左翼手":"LF","中堅手":"CF","右翼手":"RF","指名打者":"DH","控え":"-"};
const DETAILPOS=["投手","捕手","一塁手","二塁手","三塁手","遊撃手","左翼手","中堅手","右翼手","指名打者","控え"];
// 大分類→詳細ポジションのデフォルトマッピング（既存データ継承用）
const POS2DETAIL={"内野手":"二塁手","外野手":"中堅手","投手":"投手","捕手":"捕手","控え":"控え"};
const RESULTS=[
  {code:"1B",label:"単打",color:"#1e8449"},{code:"2B",label:"二塁打",color:"#1a5276"},
  {code:"3B",label:"三塁打",color:"#6c3483"},{code:"HR",label:"本塁打",color:"#c0392b"},
  {code:"K",label:"三振",color:"#c0392b"},{code:"Kc",label:"見三振",color:"#a93226"},
  {code:"BB",label:"四球",color:"#1e8449"},{code:"HBP",label:"死球DB",color:"#d35400"},
  {code:"INT",label:"インターフェア",color:"#e67e22"},
  {code:"GO",label:"ゴロ",color:"#6b7a8d"},{code:"FO",label:"フライ",color:"#6b7a8d"},
  {code:"DP",label:"ゲッツー",color:"#c0392b"},{code:"SH",label:"犠打",color:"#6b7a8d"},
  {code:"SF",label:"犠飛",color:"#6b7a8d"},{code:"E",label:"エラー",color:"#d35400"},
  {code:"FC",label:"野選FC",color:"#8fa0b4"},
  {code:"SB",label:"盗塁",color:"#1a5276"},
  {code:"CS",label:"盗塁死",color:"#c0392b"},
  {code:"PO",label:"牽制死",color:"#a93226"}
];
const RMAP=Object.fromEntries(RESULTS.map(r=>[r.code,r]));
const HIT_CODES=new Set(["1B","2B","3B","HR","HBP","BB","E","INT"]);
const OUT_CODES=new Set(["K","Kc","GO","FO","DP","SH","SF","CS","PO"]);

let S={teamName:"○○高校野球部",members:[],games:[]};
let V={screen:"home",gameId:null,gameTab:"lineup",sb:{inning:1,half:"top",outs:0,balls:0,strikes:0,fouls:0,bases:[false,false,false],myOrder:1,oppOrder:1,myPitch:0,oppPitch:0,pending:null}};

// ── Cloud Sync ──────────────────────────────────────────
let GAS_URL = localStorage.getItem("bb_gas_url") || "https://script.google.com/macros/s/AKfycbxaK5Q758YyV914xHLmmwbhanp3RqOuEpixyVdSvlQVBpmx9pUhW29JXGIzcfpNyJOr5Q/exec";
let SYNC_USER = localStorage.getItem("bb_sync_user") || "メンバー";
let _syncTimer = null;
let _syncStatus = "local"; // "local" | "syncing" | "ok" | "error"
let _lastSynced = null;

function loadS(){
  try{const d=localStorage.getItem("bb_v3");if(d)S=JSON.parse(d);}catch(e){}
}
function saveS(){
  try{localStorage.setItem("bb_v3",JSON.stringify(S));}catch(e){}
  if(GAS_URL){ _scheduleSync(); }
  _updateSyncBadge();
}

function _scheduleSync(){
  if(_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(()=>_syncToCloud(), 1500);
  _syncStatus="syncing"; _updateSyncBadge();
}

async function _syncToCloud(){
  if(!GAS_URL) return;
  try{
    _syncStatus="syncing"; _updateSyncBadge();
    await fetch(GAS_URL, {
      method:"POST",
      mode:"no-cors",
      body: JSON.stringify({data: S, updatedBy: SYNC_USER})
    });
    // no-corsのためレスポンスは読めないが、例外が出なければ送信はできている
    _syncStatus="ok"; _lastSynced=new Date();
  } catch(e){
    _syncStatus="error";
  }
  _updateSyncBadge();
}

async function loadFromCloud(){
  if(!GAS_URL){ alert("GAS URLが設定されていません"); return; }
  _syncStatus="syncing"; _updateSyncBadge();
  return new Promise((resolve)=>{
    // fetchはGASのリダイレクトでCORSエラーになるためJSONPで取得
    const cbName="__bb_cb_"+Date.now();
    const script=document.createElement("script");
    let done=false;
    const cleanup=()=>{
      done=true;
      delete window[cbName];
      if(script.parentNode) script.parentNode.removeChild(script);
    };
    window[cbName]=(json)=>{
      cleanup();
      try{
        if(json.ok&&json.data){
          const remote=typeof json.data==="string"?JSON.parse(json.data):json.data;
          if(remote&&typeof remote==="object"&&Array.isArray(remote.members)&&remote.members.length>0){
            S=remote;
            localStorage.setItem("bb_v3",JSON.stringify(S));
            _syncStatus="ok"; _lastSynced=new Date(); _updateSyncBadge();
            render(); resolve(); return;
          }
        }
        _syncStatus="ok"; _updateSyncBadge();
      }catch(e){ _syncStatus="error"; _updateSyncBadge(); }
      resolve();
    };
    script.onerror=()=>{
      if(done) return;
      cleanup();
      console.warn("loadFromCloud JSONP error");
      _syncStatus="error"; _updateSyncBadge(); render(); resolve();
    };
    setTimeout(()=>{
      if(done) return;
      cleanup();
      console.warn("loadFromCloud timeout");
      _syncStatus="error"; _updateSyncBadge(); render(); resolve();
    },10000);
    script.src=GAS_URL+"?callback="+cbName+"&t="+Date.now();
    document.head.appendChild(script);
  });
}

function _updateSyncBadge(){
  const b = el("sync-badge");
  if(!b) return;
  if(!GAS_URL){ b.textContent="💾 ローカル保存"; b.style.background="#2a3a50"; b.style.color="#8fa0b4"; b.onclick=openSyncModal; return; }
  const labels={"syncing":"🔄 同期中...","ok":"☁️ 同期済","error":"⚠️ タップして再取得","local":"💾 未設定"};
  const colors={"syncing":"#d35400","ok":"#1e8449","error":"#c0392b","local":"#2a3a50"};
  b.textContent=labels[_syncStatus]||"";
  b.style.background=colors[_syncStatus]||"#2a3a50";
  b.style.color=_syncStatus==="local"?"#8fa0b4":"#fff";
  if(_lastSynced&&_syncStatus==="ok") b.title="最終同期: "+_lastSynced.toLocaleTimeString("ja-JP");
  b.onclick=_syncStatus==="error"?loadFromCloud:openSyncModal;
}
function uid(){return Date.now()+Math.floor(Math.random()*1000);}
function el(id){return document.getElementById(id);}
function h(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function posC(p){return p==="投手"?"#c0392b":p==="捕手"?"#d35400":["一塁手","二塁手","三塁手","遊撃手"].includes(p)?"#1e8449":["左翼手","中堅手","右翼手"].includes(p)?"#1a5276":p==="指名打者"?"#6c3483":"#6b7a8d";}
function typeC(t){return t==="公式戦"?"#c0392b":t==="練習試合"?"#d35400":t==="練習"?"#1e8449":t==="合宿"?"#6c3483":"#1a5276";}
function mById(id){return S.members.find(m=>m.id==id);}
function gById(id){return S.games.find(g=>g.id==id);}
function dow(d){return["日","月","火","水","木","金","土"][new Date(d).getDay()]||"";}
function today(){return new Date().toISOString().slice(0,10);}

// ── 現在の出場者計算（lineup初期設定 + substitutionsを適用）────
// g.lineupは試合前設定のまま変更しない。交代はsubstitutionsのみで管理。
function getCurrentLineup(g){
  const base=[...g.lineup||[]].sort((a,b)=>a.order-b.order).slice(0,9);
  const current=base.map(l=>({...l}));
  (g.scorebook?.substitutions||[]).sort((a,b)=>a.inning-b.inning||(a.half==="top"?0:1)).forEach(s=>{
    const idx=s.order-1;
    if(idx>=0&&idx<current.length){
      current[idx]={...current[idx],memberId:s.inPlayer,gamePosition:s.position||current[idx].gamePosition};
    }
  });
  return current;
}
// 退場済み選手IDセット
function getExitedIds(g){
  return new Set((g.scorebook?.substitutions||[]).map(s=>s.outPlayer));
}
// 控え選手（lineup 10人目以降 + lineupに未登録のメンバー。退場済み・現出場中は除く）
function getBench(g){
  const sorted=[...g.lineup||[]].sort((a,b)=>a.order-b.order);
  const exitedIds=getExitedIds(g);
  const curLineup=getCurrentLineup(g);
  const curIds=new Set(curLineup.map(l=>l.memberId));
  // lineup の bench（10人目以降）から退場済みを除く
  const benchFromLineup=sorted.slice(9).filter(l=>!exitedIds.has(l.memberId));
  const benchIds=new Set(benchFromLineup.map(l=>l.memberId));
  // lineupに未登録のメンバーも控え候補（退場済みでなく出場中でもないもの）
  const notInLineup=S.members
    .filter(m=>!sorted.find(l=>l.memberId==m.id))
    .filter(m=>!exitedIds.has(m.id)&&!curIds.has(m.id))
    .map(m=>({memberId:m.id,gamePosition:m.subPosition?.[0]||m.position,order:9999}));
  return [...benchFromLineup,...notInLineup];
}

function miniDiamond(result,sz=36){
  const r=RMAP[result],fill=r?r.color:"none";
  const cx=sz/2,cy=sz/2,s=sz*0.4;
  const T=[cx,cy-s],R=[cx+s,cy],B=[cx,cy+s],L=[cx-s,cy];
  let sec="";
  if(result==="HR") sec=`<polygon points="${T},${R},${B},${L}" fill="${fill}" opacity=".7"/>`;
  else if(result==="3B") sec=`<polygon points="${T},${R},${cx},${cy}" fill="${fill}" opacity=".7"/><polygon points="${R},${B},${cx},${cy}" fill="${fill}" opacity=".4"/>`;
  else if(result==="2B") sec=`<polygon points="${R},${B},${cx},${cy}" fill="${fill}" opacity=".7"/>`;
  else if(["1B","HBP","BB","E","FC","INT"].includes(result)) sec=`<polygon points="${B},${L},${cx},${cy}" fill="${fill}" opacity=".5"/><polygon points="${B},${R},${cx},${cy}" fill="${fill}" opacity=".5"/>`;
  else if(["K","Kc"].includes(result)) sec=`<line x1="${T[0]}" y1="${T[1]}" x2="${B[0]}" y2="${B[1]}" stroke="${fill}" stroke-width="2"/><line x1="${L[0]}" y1="${L[1]}" x2="${R[0]}" y2="${R[1]}" stroke="${fill}" stroke-width="2"/>`;
  else if(result==="DP") sec=`<line x1="${T[0]}" y1="${T[1]}" x2="${B[0]}" y2="${B[1]}" stroke="${fill}" stroke-width="2"/><line x1="${T[0]-4}" y1="${T[1]}" x2="${B[0]-4}" y2="${B[1]}" stroke="${fill}" stroke-width="2"/>`;
  return `<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}"><polygon points="${T},${R},${B},${L}" fill="none" stroke="${result?"#6080a0":"#c0cad4"}" stroke-width="1.5"/>${sec}</svg>`;
}

// ─── RENDER ───────────────────────────────────────────────
function render(){
  document.getElementById("app").innerHTML=buildLayout();
  renderScreen();
}
function renderScreen(){
  const c=el("sc");if(!c)return;
  if(V.screen==="home") c.innerHTML=renderHome();
  else if(V.screen==="roster") c.innerHTML=renderRoster();
  else if(V.screen==="games") c.innerHTML=renderGamesList();
  else if(V.screen==="game") c.innerHTML=renderGameDetail();
  else if(V.screen==="stats") c.innerHTML=renderStats();
  else if(V.screen==="manual") c.innerHTML=renderManual();
}
function go(screen,extra){V.screen=screen;if(extra)Object.assign(V,extra);render();}

function buildLayout(){
  const tabs=[["home","🏠 ホーム"],["roster","👥 メンバー"],["games","⚾ 試合管理"],["stats","📊 成績"],["manual","❓ 使い方"]];
  return `
<div style="background:linear-gradient(135deg,#1a2535 0%,#253146 100%);border-bottom:4px solid #c0392b;padding:16px 20px 0;box-shadow:0 4px 16px rgba(0,0,0,.15)">

        <div style="font-size:11px;color:#8fa0b4;letter-spacing:2px">BASEBALL TEAM MANAGEMENT</div>
      </div>
      <div style="display:flex;gap:20px;text-align:center">
        <div><div style="font-family:'Bebas Neue';font-size:26px;color:#e8c070;line-height:1">${S.members.length}</div><div style="font-size:10px;color:#8fa0b4">選手</div></div>
        <div><div style="font-family:'Bebas Neue';font-size:26px;color:#e8c070;line-height:1">${S.games.length}</div><div style="font-size:10px;color:#8fa0b4">試合</div></div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <button id="sync-badge" onclick="openSyncModal()" style="background:#2a3a50;color:#8fa0b4;border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer">💾 ローカル保存</button>
        ${GAS_URL?`<button onclick="loadFromCloud()" style="background:transparent;border:1px solid #2a3a50;color:#8fa0b4;border-radius:5px;padding:3px 8px;font-size:10px;cursor:pointer">☁️ 最新を取得</button>`:""}

    </div>
  </div>
</div>

  </div>
  <button onclick="loadFromCloud()" style="background:${_syncStatus==="error"?"#c0392b":"#d35400"};color:#fff;border:none;border-radius:8px;padding:10px 18px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap">☁️ 最新を取得</button>
</div>`:""}
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">

      ${[["勝",wins,"#1e8449"],["負",losses,"#c0392b"],["分",S.games.filter(g=>g.myScore!=null&&g.oppScore!=null&&g.myScore===g.oppScore).length,"var(--mut)"]].map(([l,v,c])=>`<div style="text-align:center"><div style="font-family:'Bebas Neue';font-size:34px;color:${c};line-height:1">${v}</div><div style="font-size:11px;color:var(--mut)">${l}</div></div>`).join("")}

function renderLineup(g){
  const lineup=[...g.lineup||[]].sort((a,b)=>a.order-b.order);

  const bench=lineup.slice(9);        // 10人目以降は控え
  const unassigned=S.members.filter(m=>!lineup.find(l=>l.memberId==m.id));
  const startersFull=starters.length>=9;

  const posSelect=(gid,mid,cur)=>{
    const opts=DETAILPOS.includes(cur)?DETAILPOS:[cur,...DETAILPOS];
    return `<select onchange="updateLPos('${gid}','${mid}',this.value)" style="width:100px;padding:4px 6px;font-size:12px">${opts.map(p=>`<option value="${p}" ${cur===p?"selected":""}>${p}</option>`).join("")}</select>`;
  };

  return `

  <div>

    </div>
  </div>
</div>`;
}

// ── SCOREBOOK ─────────────────────────────────────────────
function renderScorebook(g){
  if(!g.oppLineup) g.oppLineup=Array.from({length:9},(_,i)=>({order:i+1,name:""}));
  const sb=g.scorebook||{atBats:[],innings:[]};
  const lineup=[...g.lineup||[]].sort((a,b)=>a.order-b.order);
  const lv=V.sb;
  // 先攻/後攻設定を反映：スコアブックに記録が全くない初期状態のみ自動設定
  if(!lv._halfInit||lv._halfInitGid!==g.id){
    const myHalf=(g.batting==="bottom")?"bottom":"top";
    lv.half=myHalf; lv._halfInit=true; lv._halfInitGid=g.id;
  }
  const isTop=lv.half==="top";

  // inning count
  const innCount=Math.max(9,...(sb.atBats||[]).map(a=>a.inning));
  const innings=Array.from({length:innCount},(_,i)=>i+1);

  // current batter info（getCurrentLineupで交代後の出場者を反映）
  const curLineup=getCurrentLineup(g);
  const curOrd=isTop?lv.myOrder:lv.oppOrder;
  const curBatter=isTop?(curLineup[lv.myOrder-1]?mById(curLineup[lv.myOrder-1].memberId):null):g.oppLineup[lv.oppOrder-1];
  const curName=isTop?(curBatter?.name||"—"):(curBatter?.name||`${lv.oppOrder}番`);
  const curPitch=isTop?lv.myPitch:lv.oppPitch;
  const lineupLen=isTop?(curLineup.length||9):(g.oppLineup.length||9);
  const nextIdx=(curOrd%lineupLen);
  const nextBatter=isTop?(curLineup[nextIdx]?mById(curLineup[nextIdx].memberId):null):g.oppLineup[nextIdx];
  const nextName=isTop?(nextBatter?.name||"—"):(nextBatter?.name||`${nextIdx+1}番`);

  const getAB=(order,inning,half)=>(sb.atBats||[]).filter(a=>a.battingOrder===order&&a.inning===inning&&a.half===half);

  const bigBtn=(code,label,color,bg)=>
    `<button onclick="recordResult('${g.id}','${code}')"
      style="background:${bg};color:${color};border:2px solid ${color};border-radius:10px;padding:12px 8px;font-size:13px;font-weight:900;cursor:pointer;min-width:62px;text-align:center;line-height:1.3;font-family:inherit"
    >${label}</button>`;

  return `
<!-- 状況バー -->
<div style="display:flex;gap:10px;align-items:center;background:#1a2535;border-radius:12px;padding:12px 18px;margin-bottom:12px;flex-wrap:wrap">
  <div style="display:flex;align-items:center;gap:6px">
    <button onclick="V.sb.inning=Math.max(1,V.sb.inning-1);renderScreen()" style="background:#2a3a50;color:#fff;border:none;border-radius:6px;width:28px;height:28px;font-size:16px;cursor:pointer">◀</button>
    <div style="text-align:center;min-width:52px"><div style="font-family:'Bebas Neue';font-size:28px;color:#e8c070;line-height:1">${lv.inning}</div><div style="font-size:10px;color:#8fa0b4">回</div></div>
    <button onclick="V.sb.inning=Math.min(15,V.sb.inning+1);renderScreen()" style="background:#2a3a50;color:#fff;border:none;border-radius:6px;width:28px;height:28px;font-size:16px;cursor:pointer">▶</button>
  </div>
  <div style="display:flex;gap:4px">
    <button onclick="setHalf('top')" style="padding:6px 14px;border-radius:6px;border:2px solid ${isTop?"#e8c070":"#2a3a50"};background:${isTop?"#e8c070":"transparent"};color:${isTop?"#1a2535":"#8fa0b4"};font-weight:700;font-size:14px;cursor:pointer">${g.batting==="bottom"?"裏（自）":"表（自）"}</button>
    <button onclick="setHalf('bottom')" style="padding:6px 14px;border-radius:6px;border:2px solid ${!isTop?"#e74c3c":"#2a3a50"};background:${!isTop?"#e74c3c":"transparent"};color:${!isTop?"#fff":"#8fa0b4"};font-weight:700;font-size:14px;cursor:pointer">${g.batting==="bottom"?"表（相手）":"裏（相手）"}</button>
  </div>
  <div style="display:flex;align-items:center;gap:8px;padding:0 8px;border-left:1px solid #2a3a50;border-right:1px solid #2a3a50">
    <span style="font-size:11px;color:#8fa0b4;font-weight:700">アウト</span>
    ${[0,1,2].map(i=>`<div onclick="setOuts(${i+1})" style="width:22px;height:22px;border-radius:50%;background:${lv.outs>i?"#d35400":"#2a3a50"};border:2px solid ${lv.outs>i?"#d35400":"#3a5068"};cursor:pointer"></div>`).join("")}
    <button onclick="setOuts(0)" style="background:transparent;border:none;color:#607080;font-size:11px;cursor:pointer">↩</button>

  <div style="display:flex;gap:12px;align-items:center">

    <div style="font-family:'Bebas Neue';font-size:24px;color:#607080">:</div>
    <div style="text-align:center"><div style="font-size:9px;color:#e74c3c;font-weight:700">相手 ${lv.inning}回</div>
      <input type="number" min="0" value="${(g.oppInnings&&g.oppInnings[lv.inning-1])||0}" onchange="saveOppInn('${g.id}',${lv.inning},this.value)" style="width:52px;text-align:center;font-family:'Bebas Neue';font-size:22px;padding:3px;background:#2a3a50;border:1px solid #3a5068;color:#e74c3c;border-radius:6px"></div>
    <!-- 通算スコア -->
    <div style="border-left:1px solid #2a3a50;padding-left:14px;text-align:center">
      <div style="font-size:9px;color:#8fa0b4;font-weight:700;letter-spacing:1px;margin-bottom:2px">通算スコア</div>
      <div style="display:flex;align-items:center;gap:6px">
        <div style="text-align:center">
          <div style="font-size:10px;color:#27ae60;font-weight:700">${h(S.teamName).slice(0,4)}</div>
          <div style="font-family:'Bebas Neue';font-size:36px;color:${(()=>{const my=(sb.innings||[]).reduce((a,b)=>a+(b||0),0),opp=(g.oppInnings||[]).reduce((a,b)=>a+(b||0),0);return my>opp?"#27ae60":my<opp?"#e74c3c":"#e8c070";})()};line-height:1">${(sb.innings||[]).reduce((a,b)=>a+(b||0),0)}</div>
        </div>
        <div style="font-family:'Bebas Neue';font-size:28px;color:#607080;line-height:1">-</div>
        <div style="text-align:center">
          <div style="font-size:10px;color:#e74c3c;font-weight:700">相手</div>
          <div style="font-family:'Bebas Neue';font-size:36px;color:${(()=>{const my=(sb.innings||[]).reduce((a,b)=>a+(b||0),0),opp=(g.oppInnings||[]).reduce((a,b)=>a+(b||0),0);return opp>my?"#e74c3c":opp<my?"#27ae60":"#e8c070";})()};line-height:1">${(g.oppInnings||[]).reduce((a,b)=>a+(b||0),0)}</div>
        </div>
      </div>
    </div>
  </div>
</div>

        if(orderSubs.length>0){
          players.push({mid:orderSubs[0].outPlayer,from:1,to:orderSubs[0].inning,pos:null});

            const next=orderSubs[si+1];

          });
        } else {
          players.push({mid:curEntry.memberId,from:1,to:null,pos:curEntry.gamePosition||null});
        }
        const getPosFor=(mid,pos)=>{
          if(pos&&DETAILPOS.includes(pos))return pos;

                <div style="display:flex;flex-direction:column;gap:2px;align-items:center">
                  ${abs.length>0?abs.map(ab=>{
                    const r=RMAP[ab.result]||{};

                    </div>`;}).join(""):`<div class="ab-cell" onclick="V.sb.myOrder=${orderIdx+1};V.sb.inning=${i};V.sb.half='top';renderScreen()"></div>`}
                </div></td>`;
            }).join("")}
            ${pi===0?`<td style="text-align:center;font-family:'Bebas Neue';font-size:18px;color:#1e8449;vertical-align:middle" rowspan="${players.length}">${totalHits||""}</td>`:""}
          </tr>`;
        }).join("");
      }).join("")}

// ── RESULT ────────────────────────────────────────────────
function renderResult(g){
  const sb=g.scorebook||{atBats:[]};
  const lineup=[...g.lineup||[]].sort((a,b)=>a.order-b.order);
  const stat=(idx)=>{
    const abs=(sb.atBats||[]).filter(a=>a.battingOrder===idx+1&&a.half==="top");
    const ab=abs.filter(a=>!["BB","HBP","SH","SF"].includes(a.result)).length;
    const hits=abs.filter(a=>["1B","2B","3B","HR","HBP"].includes(a.result)).length;
    const hr=abs.filter(a=>a.result==="HR").length;
    const rbi=abs.reduce((s,a)=>s+(a.rbi||0),0);
    const bb=abs.filter(a=>["BB","HBP"].includes(a.result)).length;
    const k=abs.filter(a=>["K","Kc"].includes(a.result)).length;
    return {ab,hits,hr,rbi,bb,k,avg:ab>0?(hits/ab).toFixed(3):".---"};
  };
  const bothScored=g.myScore!=null&&g.oppScore!=null;
  const rc=bothScored?(g.myScore>g.oppScore?"#1e8449":g.myScore<g.oppScore?"#c0392b":"#1a2535"):"#6b7a8d";
  return `
<div class="card" style="margin-bottom:14px;text-align:center;padding:20px">
  <div style="font-size:12px;color:var(--mut);margin-bottom:6px">${g.type}${g.location?" — "+g.location:""}</div>
  <div style="font-family:'Bebas Neue';font-size:52px;letter-spacing:8px;color:${rc};line-height:1">${g.myScore??"-"} : ${g.oppScore??"-"}</div>
  <div style="font-size:16px;font-weight:700;color:${rc};margin-top:4px">${bothScored?(g.myScore>g.oppScore?"勝利":g.myScore<g.oppScore?"敗北":"引分"):"未定"}</div>
</div>
${lineup.length>0?`
<div class="card" style="overflow-x:auto">
  <div style="font-size:11px;font-weight:700;color:var(--mut);letter-spacing:2px;margin-bottom:10px">打撃成績</div>
  <table style="min-width:500px">
    <thead><tr><th>打順</th><th>選手</th><th style="text-align:center">打数</th><th style="text-align:center">安打</th><th style="text-align:center">本塁打</th><th style="text-align:center">打点</th><th style="text-align:center">四死球</th><th style="text-align:center">三振</th><th style="text-align:center">打率</th></tr></thead>
    <tbody>
      ${lineup.map((l,idx)=>{const m=mById(l.memberId);if(!m)return"";const s=stat(idx);return `<tr class="row-h"><td style="text-align:center;font-family:'Bebas Neue';font-size:18px">${idx+1}</td><td><div style="font-weight:700;font-size:13px">${h(m.name)}</div></td>${[s.ab,s.hits,s.hr,s.rbi,s.bb,s.k].map(v=>`<td style="text-align:center;font-family:'Rajdhani';font-size:15px">${v}</td>`).join("")}<td style="text-align:center;font-family:'Rajdhani';font-size:13px;font-weight:700;color:${parseFloat(s.avg)>=.3?"#1e8449":parseFloat(s.avg)>=.25?"#d35400":"var(--mut)"}">${s.avg}</td></tr>`;}).join("")}
    </tbody>
  </table>
</div>`:""}`;
}

// ── STATS ─────────────────────────────────────────────────
function renderStats(){
  const ps={};S.members.forEach(m=>{ps[m.id]={ab:0,hits:0,hr:0,rbi:0,bb:0,k:0,games:0};});
  S.games.forEach(g=>{
    const sb=g.scorebook||{};
    (g.lineup||[]).forEach((l,idx)=>{
      const s=ps[l.memberId];if(!s)return;
      const abs=(sb.atBats||[]).filter(a=>a.battingOrder===idx+1&&a.half==="top");
      if(abs.length>0)s.games++;
      s.ab+=abs.filter(a=>!["BB","HBP","SH","SF"].includes(a.result)).length;
      s.hits+=abs.filter(a=>["1B","2B","3B","HR","HBP"].includes(a.result)).length;

<div class="card" style="margin-bottom:16px;display:flex;gap:24px;align-items:center;flex-wrap:wrap">

// Lineup
function addLine(gid,mid){
  const g=gById(gid);if(!g||!g.lineup)g.lineup=[];
  const midN=isNaN(mid)?mid:Number(mid);
  if((g.lineup||[]).find(l=>l.memberId==midN))return;
  const m=mById(midN);
  const subs=Array.isArray(m?.subPosition)?m.subPosition:(m?.subPosition&&m.subPosition!=="なし"?[m.subPosition]:[]);
  const defPos=subs.length>0?subs[0]:(DETAILPOS.includes(m?.position)?m.position:(POS2DETAIL[m?.position]||"二塁手"));
  g.lineup.push({memberId:midN,gamePosition:defPos,order:g.lineup.length});
  saveS();renderScreen();
}
function removeLine(gid,mid){const g=gById(gid);if(!g)return;g.lineup=g.lineup.filter(l=>l.memberId!=mid);g.lineup.forEach((l,i)=>l.order=i);saveS();renderScreen();}
function clearLineup(gid){if(confirm("リセットしますか？")){const g=gById(gid);if(g){g.lineup=[];saveS();renderScreen();}}}
function updateLPos(gid,mid,pos){const g=gById(gid);if(!g)return;const l=(g.lineup||[]).find(l=>l.memberId==mid);if(l){l.gamePosition=pos;saveS();}}
function moveLine(gid,mid,dir){
  const g=gById(gid);if(!g)return;
  const s=[...g.lineup].sort((a,b)=>a.order-b.order);
  const idx=s.findIndex(l=>l.memberId==mid);const ni=idx+dir;
  // スタメン（0〜8）内のみ移動可能
  if(ni<0||ni>=Math.min(9,s.length))return;
  [s[idx].order,s[ni].order]=[s[ni].order,s[idx].order];
  saveS();renderScreen();
}
// 控えをスタメンの末尾（9番目以前の空き）に昇格
function promoteToStarter(gid,mid){
  const g=gById(gid);if(!g)return;
  const s=[...g.lineup].sort((a,b)=>a.order-b.order);
  const starters=s.slice(0,9);if(starters.length>=9)return;
  const entry=g.lineup.find(l=>l.memberId==mid);if(!entry)return;
  // 現在の order を starters の末尾相当に付け替え
  const maxStarterOrder=starters.length>0?Math.max(...starters.map(l=>l.order)):-1;
  // 控え以降を全員1つ後ろにずらして、対象をスタメン末尾に挿入
  entry.order=maxStarterOrder+1;
  // order を整列
  const resorted=[...g.lineup].sort((a,b)=>a.order-b.order);
  resorted.forEach((l,i)=>l.order=i);
  saveS();renderScreen();
}

// ── recordResult ──────────────────────────────────────────
// 表示用日本語ラベル（スコアシートセルに表示）
const DISP={
  "1B":"安打","2B":"二塁打","3B":"三塁打","HR":"本塁打",
  "K":"三振","Kc":"見三振","BB":"四球","HBP":"死球",
  "INT":"妨害","GO":"ゴロ","FO":"フライ","DP":"併殺",
  "SH":"犠打","SF":"犠飛","E":"エラー","FC":"野選",
  "SB":"盗塁","CS":"盗塁死","PO":"牽制死"
};
function recordResult(gid,code,skipPitch){
  const g=gById(gid);if(!g)return;
  if(!g.scorebook)g.scorebook={atBats:[],innings:[]};
  const lv=V.sb,isTop=lv.half==="top";

  // 直接結果ボタンを押した場合（skipPitch=false）の球数補正
  if(!skipPitch){
    if(code==="BB"){
      // 残り分を球数に加算（4球目まで）
      const need=4-lv.balls;
      if(isTop)lv.myPitch=(lv.myPitch||0)+need;else lv.oppPitch=(lv.oppPitch||0)+need;
      lv.balls=4;
    } else if(code==="K"||code==="Kc"){
      const need=3-lv.strikes;
      if(isTop)lv.myPitch=(lv.myPitch||0)+need;else lv.oppPitch=(lv.oppPitch||0)+need;
      lv.strikes=3;
    } else if(code==="HBP"||code==="INT"){
      // 死球・妨害は現在カウントに+1
      if(isTop)lv.myPitch=(lv.myPitch||0)+1;else lv.oppPitch=(lv.oppPitch||0)+1;
    } else {
      // その他の結果ボタンは1球消費
      if(isTop)lv.myPitch=(lv.myPitch||0)+1;else lv.oppPitch=(lv.oppPitch||0)+1;
    }
  }

  const ab={id:uid(),inning:lv.inning,half:lv.half,battingOrder:isTop?lv.myOrder:lv.oppOrder,balls:lv.balls,strikes:lv.strikes,result:code,rbi:0,note:""};
  g.scorebook.atBats.push(ab);
  const b=lv.bases;
  let scored=0;

  // ── HR
  if(code==="HR"){scored=1+b.filter(x=>x).length;lv.bases=[false,false,false];addScore(g,lv.inning,scored);ab.rbi=scored;nextBatter(lv,g);return;}

  // ── BB/HBP/INT
  if(["BB","HBP","INT"].includes(code)){
    let n=[b[0],b[1],b[2]];
    if(b[0]&&b[1]&&b[2]){scored=1;n=[true,true,true];}
    else if(b[0]&&b[1])n=[true,true,true];
    else if(b[0])n=[true,true,b[2]];
    else n=[true,b[1],b[2]];
    if(scored){addScore(g,lv.inning,scored);ab.rbi=scored;}
    lv.bases=n;nextBatter(lv,g);return;
  }

  // ── 3B
  if(code==="3B"){scored=b.filter(x=>x).length;lv.bases=[false,false,true];if(scored){addScore(g,lv.inning,scored);ab.rbi=scored;}nextBatter(lv,g);return;}

  // ── 2B: always show dialog
  if(code==="2B"){
    const opts=[];
    const[b1,b2,b3]=b;
    if(!b1&&!b2&&!b3){lv.bases=[false,true,false];nextBatter(lv,g);return;}
    if(b3&&b2&&b1){opts.push({l:"全走者ホームイン(3点)、打者2塁",bases:[false,true,false],sc:3});opts.push({l:"2塁・3塁ホームイン(2点)、1塁→3塁、打者2塁",bases:[false,true,true],sc:2});opts.push({l:"3塁ホームイン(1点)、2塁→3塁、1塁→2塁、打者2塁",bases:[false,true,false],sc:1});}
    else if(b2&&b3){opts.push({l:"3塁・2塁走者ホームイン(2点)、打者2塁",bases:[false,true,false],sc:2});opts.push({l:"3塁ホームイン(1点)、2塁→3塁、打者2塁",bases:[false,true,true],sc:1});opts.push({l:"【特殊】全走者ストップ（2・3塁のまま）",bases:[false,true,true],sc:0});}
    else if(b1&&b3){opts.push({l:"3塁ホームイン(1点)、1塁→3塁、打者2塁",bases:[false,true,true],sc:1});opts.push({l:"3塁・1塁ホームイン(2点)、打者2塁",bases:[false,true,false],sc:2});}
    else if(b1&&b2){opts.push({l:"2塁ホームイン(1点)、1塁→3塁、打者2塁",bases:[false,true,true],sc:1});opts.push({l:"2塁・1塁ホームイン(2点)、打者2塁",bases:[false,true,false],sc:2});}
    else if(b3){opts.push({l:"3塁ホームイン(1点)、打者2塁",bases:[false,true,false],sc:1});opts.push({l:"3塁走者ストップ（2・3塁）",bases:[false,true,true],sc:0});}
    else if(b2){opts.push({l:"2塁ホームイン(1点)、打者2塁",bases:[false,true,false],sc:1});opts.push({l:"2塁→3塁ストップ（2・3塁）",bases:[false,true,true],sc:0});}
    else if(b1){opts.push({l:"1塁→3塁、打者2塁",bases:[false,true,true]});opts.push({l:"1塁ホームイン(1点)、打者2塁",bases:[false,true,false],sc:1});}
    showAdv("二塁打：走者の進塁先を選んでください",opts,g,lv.inning);nextBatter(lv,g);return;
  }

  // ── 1B
  if(code==="1B"){
    const[b1,b2,b3]=b;
    if(!b1&&!b2&&!b3){lv.bases=[true,false,false];nextBatter(lv,g);return;}
    scored=b3?1:0;if(scored){addScore(g,lv.inning,scored);ab.rbi=scored;}
    const opts=[];
    if(b1&&b2){opts.push({l:"1塁→2塁、2塁→3塁、打者1塁",bases:[true,true,true]});opts.push({l:"1塁→2塁、2塁ホームイン(1点)、打者1塁",bases:[true,false,true],sc:1});opts.push({l:"1塁→3塁、2塁ホームイン(1点)、打者1塁",bases:[true,false,false],sc:1});}
    else if(b1){opts.push({l:"1塁→2塁、打者1塁",bases:[true,true,b3?false:false]});opts.push({l:"1塁→3塁、打者1塁",bases:[true,false,true]});}
    else if(b2){opts.push({l:"2塁→3塁、打者1塁",bases:[true,false,true]});opts.push({l:"2塁ホームイン(1点)、打者1塁",bases:[true,false,false],sc:1});}
    else{lv.bases=[true,false,false];nextBatter(lv,g);return;}
    if(scored){// 得点は事前加算済み、追加得点のみ
      opts.forEach(o=>{if(o.sc){}});}
    showAdv("単打：走者の進塁先を選んでください",opts,g,lv.inning);nextBatter(lv,g);return;
  }

  // ── E/FC
  if(["E","FC"].includes(code)){lv.bases[0]=true;nextBatter(lv,g);return;}

  // ── K/Kc
  if(["K","Kc"].includes(code)){lv.outs=Math.min(3,lv.outs+1);nextBatter(lv,g);return;}

  // ── GO
  if(code==="GO"){
    lv.outs=Math.min(3,lv.outs+1);
    // 3アウト目はランナーの動きを聞かない（イニング終了）
    if(lv.outs>=3){nextBatter(lv,g);return;}
    if(!b[0]&&!b[1]&&!b[2]){nextBatter(lv,g);return;}
    const[b1,b2,b3]=b,opts=[];
    if(b3&&!b1&&!b2){opts.push({l:"3塁走者ストップ、打者アウト",bases:[false,false,true]});opts.push({l:"3塁走者ホームイン(1点)、打者アウト",bases:[false,false,false],sc:1});}
    else if(b1&&!b2&&!b3){opts.push({l:"1塁走者→2塁（打者アウト）",bases:[false,true,false]});opts.push({l:"1塁走者ストップ（打者アウト）",bases:[true,false,false]});}
    else if(!b1&&b2&&!b3){opts.push({l:"2塁走者→3塁",bases:[false,false,true]});opts.push({l:"2塁走者ストップ",bases:[false,true,false]});}
    else if(b1&&b2&&!b3){opts.push({l:"フォースアウト：1塁走者アウト、2塁→3塁、打者1塁",bases:[true,false,true]});opts.push({l:"1塁→2塁、2塁→3塁（打者アウト）",bases:[false,true,true]});}
    else if(b1&&!b2&&b3){opts.push({l:"1塁→2塁、3塁ストップ（打者アウト）",bases:[false,true,true]});opts.push({l:"3塁ホームイン(1点)、1塁→2塁（打者アウト）",bases:[false,true,false],sc:1});}
    else if(!b1&&b2&&b3){opts.push({l:"走者そのまま（打者アウト）",bases:[false,true,true]});opts.push({l:"3塁ホームイン(1点)、2塁走者ストップ（打者アウト）",bases:[false,true,false],sc:1});}
    else if(b1&&b2&&b3){opts.push({l:"フォースアウト：打者1塁、全走者1つ進塁",bases:[true,true,true]});opts.push({l:"フォースアウト：3塁走者ホームイン(1点)、打者1塁",bases:[true,true,false],sc:1});}
    if(opts.length===0){nextBatter(lv,g);return;}
    showAdv("ゴロアウト：走者の動きを選んでください",opts,g,lv.inning);nextBatter(lv,g);return;
  }

  // ── FO (タッチアップ)
  if(code==="FO"){
    lv.outs=Math.min(3,lv.outs+1);
    // 3アウト目はタッチアップを聞かない（イニング終了）
    if(lv.outs>=3){nextBatter(lv,g);return;}
    if(!b[0]&&!b[1]&&!b[2]){nextBatter(lv,g);return;}
    const[b1,b2,b3]=b,opts=[{l:"タッチアップなし（全走者ストップ）",bases:[...b]}];
    if(b3)opts.push({l:"3塁走者タッチアップ→ホームイン(1点)",bases:[b1,b2,false],sc:1});
    if(b2&&!b3)opts.push({l:"2塁走者タッチアップ→3塁",bases:[b1,false,true]});
    if(b1&&!b2)opts.push({l:"1塁走者タッチアップ→2塁",bases:[false,true,b3]});
    showAdv("フライアウト：タッチアップを選んでください",opts,g,lv.inning);nextBatter(lv,g);return;
  }

  // ── DP
  if(code==="DP"){
    lv.outs=Math.min(3,lv.outs+2);
    if(lv.outs>=3){nextBatter(lv,g);return;}
    const[b1,b2,b3]=b,opts=[];
    if(!b1&&!b2&&!b3){lv.outs=Math.max(0,lv.outs-1);nextBatter(lv,g);return;}
    if(b1&&b2&&b3){opts.push({l:"6-4-3: 1塁・2塁走者アウト、3塁残",bases:[false,false,true]});opts.push({l:"5-4-3: 同上",bases:[false,false,true]});}
    else if(b1&&b2){opts.push({l:"6-4-3: 1塁・2塁走者アウト",bases:[false,false,false]});opts.push({l:"4-6-3: 1塁走者アウト→打者1塁",bases:[false,true,false]});}
    else if(b1){opts.push({l:"4-6-3: 打者→1塁走者アウト",bases:[false,false,b3]});opts.push({l:"3-6-1: 打者→1塁走者アウト",bases:[false,b2,b3]});}
    else{lv.outs=Math.max(0,lv.outs-1);nextBatter(lv,g);return;}
    showAdv("ゲッツー：進塁を選んでください",opts,g,lv.inning);nextBatter(lv,g);return;
  }

  // ── SH
  if(code==="SH"){
    lv.outs=Math.min(3,lv.outs+1);
    if(lv.outs>=3){nextBatter(lv,g);return;}
    if(!b[0]&&!b[1]&&!b[2]){nextBatter(lv,g);return;}
    const[b1,b2,b3]=b;
    const basicB=[false,b1||false,b2||false];const basicSc=b3?1:0;
    const opts=[{l:"通常：全走者1つ進塁"+(b3?"（3塁走者ホームイン）":""),bases:basicB,sc:basicSc}];
    if(b1&&b3)opts.push({l:"3塁走者ストップ、1塁→2塁",bases:[false,true,true]});
    if(opts.length===1){lv.bases=basicB;if(basicSc){addScore(g,lv.inning,basicSc);ab.rbi=basicSc;}}
    else showAdv("犠打：走者の進塁先を選んでください",opts,g,lv.inning);
    nextBatter(lv,g);return;
  }

  // ── SF
  if(code==="SF"){
    lv.outs=Math.min(3,lv.outs+1);
    if(lv.outs>=3){nextBatter(lv,g);return;}
    if(!b[2]){nextBatter(lv,g);return;}
    const[b1,b2]=b;
    const opts=[{l:"3塁走者ホームイン(1点)",bases:[b1,b2,false],sc:1}];
    if(b2)opts.push({l:"3塁ホームイン(1点)＋2塁→3塁タッチアップ",bases:[b1,false,true],sc:1});
    showAdv("犠牲フライ：進塁を確認してください",opts,g,lv.inning);nextBatter(lv,g);return;
  }

  nextBatter(lv,g);
}

function recordRunnerEvent(gid,code){
  const g=gById(gid);if(!g)return;
  if(!g.scorebook)g.scorebook={atBats:[],innings:[]};
  const lv=V.sb;
  const b=lv.bases;
  // ランナーイベントとして記録（打席記録ではない・打順は進まない）
  if(!g.scorebook.runnerEvents) g.scorebook.runnerEvents=[];
  if(code==="SB"){
    // 盗塁：ランナーを1つ進める（進めるランナーを選択できる）
    const opts=[];
    if(b[0]) opts.push({l:"1塁走者→2塁に盗塁",fn:()=>{lv.bases=[false,b[1]?b[1]:true,b[2]];if(!b[1])lv.bases[1]=true;lv.bases[0]=false;}});
    if(b[1]) opts.push({l:"2塁走者→3塁に盗塁",fn:()=>{lv.bases=[b[0],false,true];}});
    // 複数ランナーが走る
    if(b[0]&&b[1]) opts.push({l:"1塁・2塁走者ともに盗塁（2・3塁→）",fn:()=>{lv.bases=[false,true,true];}});
    if(b[0]&&!b[1]&&!b[2]){
      // 1塁のみ：直接2塁へ
      lv.bases=[false,true,false];
      g.scorebook.runnerEvents.push({id:uid(),inning:lv.inning,half:lv.half,type:"SB",note:"1塁→2塁"});
      saveS();renderScreen();return;
    }
    if(!b[0]&&b[1]&&!b[2]){
      lv.bases=[false,false,true];
      g.scorebook.runnerEvents.push({id:uid(),inning:lv.inning,half:lv.half,type:"SB",note:"2塁→3塁"});
      saveS();renderScreen();return;
    }
    if(opts.length>0){
      // 複数選択肢がある場合はダイアログ
      const m=el("adv-modal");if(!m)return;
      el("adv-title").textContent="盗塁：進塁するランナーを選んでください";
      el("adv-buttons").innerHTML=opts.map((o,i)=>
        `<button onclick="selectSbAdv(${i})"
          style="display:block;width:100%;padding:14px 16px;margin-bottom:8px;border-radius:10px;border:2px solid #1e8449;background:#e8f5e9;color:#1e8449;font-size:15px;font-weight:700;cursor:pointer;text-align:left;font-family:inherit">
          🏃 ${o.l}
        </button>`).join("");
      m._sbOpts=opts;m._sbGid=gid;
      m.style.display="flex";
    }
    return;
  }
  if(code==="WP"||code==="PB"){
    // 暴投・パスボール：ランナーが1つずつ進む（打順は進まない）
    const label=code==="WP"?"暴投(WP)":"パスボール(PB)";
    const b=lv.bases;
    if(!b[0]&&!b[1]&&!b[2]){ alert("ランナーがいません"); return; }
    // 全員1つ進む（3塁ランナーはホームイン）
    const scored=b[2]?1:0;
    const newBases=[false,b[0]||false,b[1]||false];
    if(scored){
      // 自チームか相手チームかで得点先を分ける
      const g2=gById(gid);
      if(g2){ addScore(g2,lv.inning,scored); saveS(); }
    }
    lv.bases=newBases;
    g.scorebook.runnerEvents.push({id:uid(),inning:lv.inning,half:lv.half,type:code,note:scored?"ホームイン":"進塁"});
    saveS(); renderScreen(); return;
  }
  if(code==="CS"||code==="PO"){
    // 盗塁死・牽制死：アウト+1、ランナーを消す
    const label=code==="CS"?"盗塁死":"牽制死";
    const baseOpts=[];
    if(b[0]) baseOpts.push({l:`1塁走者が${label}`,idx:0});
    if(b[1]) baseOpts.push({l:`2塁走者が${label}`,idx:1});
    if(b[2]) baseOpts.push({l:`3塁走者が${label}`,idx:2});
    if(baseOpts.length===0){
      alert("ランナーがいません");return;
    }
    if(baseOpts.length===1){
      lv.bases[baseOpts[0].idx]=false;
      lv.outs=Math.min(3,lv.outs+1);
      g.scorebook.runnerEvents.push({id:uid(),inning:lv.inning,half:lv.half,type:code,note:baseOpts[0].l});
      saveS();
      if(lv.outs>=3) nextBatter(lv,g); else renderScreen();
      return;
    }
    const m=el("adv-modal");if(!m)return;
    el("adv-title").textContent=`${label}：どの走者ですか？`;
    el("adv-buttons").innerHTML=baseOpts.map((o,i)=>
      `<button onclick="selectCsAdv('${gid}',${o.idx},'${code}')"
        style="display:block;width:100%;padding:14px 16px;margin-bottom:8px;border-radius:10px;border:2px solid #c0392b;background:#fdecea;color:#c0392b;font-size:15px;font-weight:700;cursor:pointer;text-align:left;font-family:inherit">
        ✕ ${o.l}
      </button>`).join("");
    m.style.display="flex";
  }
}
function selectSbAdv(idx){
  const m=el("adv-modal");if(!m)return;
  const opt=m._sbOpts?.[idx];if(!opt)return;
  opt.fn();
  const g=gById(m._sbGid);if(g){if(!g.scorebook.runnerEvents)g.scorebook.runnerEvents=[];g.scorebook.runnerEvents.push({id:uid(),inning:V.sb.inning,half:V.sb.half,type:"SB",note:opt.l});saveS();}
  m.style.display="none";renderScreen();
}
function selectCsAdv(gid,baseIdx,code){
  const m=el("adv-modal");if(!m)return;
  const lv=V.sb;
  lv.bases[baseIdx]=false;
  lv.outs=Math.min(3,lv.outs+1);
  const g=gById(gid);if(g){if(!g.scorebook.runnerEvents)g.scorebook.runnerEvents=[];g.scorebook.runnerEvents.push({id:uid(),inning:lv.inning,half:lv.half,type:code,note:`${["1塁","2塁","3塁"][baseIdx]}走者`});saveS();}
  m.style.display="none";
  if(lv.outs>=3) nextBatter(lv,g||{}); else renderScreen();
}

function addScore(g,inn,n){
  const lv=V.sb,isTop=lv.half==="top";
  if(isTop){if(!g.scorebook.innings)g.scorebook.innings=[];while(g.scorebook.innings.length<inn)g.scorebook.innings.push(0);g.scorebook.innings[inn-1]=(g.scorebook.innings[inn-1]||0)+n;g.myScore=g.scorebook.innings.reduce((a,b)=>a+(b||0),0);}
  else{if(!g.oppInnings)g.oppInnings=[];while(g.oppInnings.length<inn)g.oppInnings.push(0);g.oppInnings[inn-1]=(g.oppInnings[inn-1]||0)+n;g.oppScore=g.oppInnings.reduce((a,b)=>a+(b||0),0);}
}

function nextBatter(lv,g){
  const isTop=lv.half==="top";
  const len=isTop?((g.lineup||[]).length||9):((g.oppLineup||[]).length||9);
  lv.balls=0;lv.strikes=0;lv.fouls=0;
  if(lv.outs>=3){
    lv.outs=0;lv.bases=[false,false,false];
    lv.pending=null; // 3アウトでイニング進行：進塁ダイアログをキャンセル
    if(lv.half==="top")lv.half="bottom";
    else{lv.half="top";lv.inning=lv.inning+1;}
    lv._changed=true;
  } else {
    if(isTop)lv.myOrder=lv.myOrder>=len?1:lv.myOrder+1;
    else lv.oppOrder=lv.oppOrder>=len?1:lv.oppOrder+1;
  }
  saveS();renderScreen();
  if(lv._changed){lv._changed=false;setTimeout(()=>{const n=el("inn-notice");if(n){n.style.opacity="1";setTimeout(()=>{n.style.opacity="0";},2500);}},100);}
  if(lv.pending){const p=lv.pending;lv.pending=null;showAdvDialog(p);}
}

function showAdv(label,opts,g,inn){
  V.sb.pending={label,opts,gid:g.id,inn};
}
function showAdvDialog(p){
  const m=el("adv-modal");if(!m)return;
  el("adv-title").textContent=p.label;
  el("adv-buttons").innerHTML=p.opts.map((o,i)=>
    `<button onclick="selectAdv(${i})"
      style="display:block;width:100%;padding:14px 16px;margin-bottom:8px;border-radius:10px;border:2px solid #1a5276;background:#e8f0fb;color:#1a5276;font-size:15px;font-weight:700;cursor:pointer;text-align:left;font-family:inherit">
      ${o.l}${o.sc?`<span style="color:#c0392b;margin-left:8px">（得点+${o.sc}）</span>`:""}
    </button>`).join("");
  m.style.display="flex";m._p=p;
}
function selectAdv(idx){
  const m=el("adv-modal");if(!m)return;
  const p=m._p;if(!p)return;
  const o=p.opts[idx];
  V.sb.bases=[...o.bases];
  if(o.sc){const g=gById(p.gid);if(g)addScore(g,p.inn,o.sc);saveS();}
  m.style.display="none";renderScreen();
}

function saveAb(){
  const gid=el("ab-gid").value,abid=el("ab-id").value;

function delAb(){

}

// Substitution
function openSubModal(gid){
  const g=gById(gid);if(!g)return;
  el("sub-gid").value=gid;

  // 現在の出場者（substitutions適用後）
  const cur=getCurrentLineup(g);
  // 控え選手（lineup 10人目以降）
  const bench=getBench(g);
  // 退場済みID
  const exitedIds=getExitedIds(g);

  // sub-order: 現在出場中のスタメン9人
  el("sub-order").innerHTML=cur.map((l,i)=>{
    const m=mById(l.memberId);
    return `<option value="${i}">${i+1}番 ${m?h(m.name):"?"} [${PPOS[l.gamePosition||m?.position]||"?"}]</option>`;
  }).join("");

  // sub-nm: 控えのうち退場済みでない選手のみ
  el("sub-nm").innerHTML=bench.length>0
    ? bench.map(l=>{const m=mById(l.memberId);if(!m)return"";return `<option value="${m.id}">${m.number?"#"+m.number+" ":""}${h(m.name)}（${PPOS[l.gamePosition||m.position]||m.position}）</option>`;}).join("")
    : `<option value="" disabled>交代可能な選手がいません</option>`;

  // シフト変更グリッド: 現在の出場者全員
  const tamaGrid=el("sub-tama-grid");
  if(tamaGrid)tamaGrid.innerHTML=cur.map((l,i)=>{
    const m=mById(l.memberId);if(!m)return"";
    const pos=l.gamePosition||m.position;
    const opts=DETAILPOS.includes(pos)?DETAILPOS:[pos,...DETAILPOS];
    return `<div style="display:flex;gap:10px;align-items:center;margin-bottom:6px">
      <span style="font-size:13px;font-weight:700;min-width:20px;color:var(--red)">${i+1}</span>
      <span style="font-size:13px;font-weight:700;min-width:80px">${h(m.name)}</span>
      <span style="min-width:28px;font-size:11px;color:var(--mut)">${PPOS[pos]||pos}</span>
      <span style="color:var(--mut)">→</span>
      <select data-ti="${i}" style="flex:1;font-size:13px;padding:6px">
        ${opts.map(p=>`<option value="${p}" ${pos===p?"selected":""}>${p}（${PPOS[p]||p}）</option>`).join("")}
      </select>
    </div>`;
  }).join("");

  setSubType("ph");
  _initSubPos();
  el("sub-modal").style.display="flex";
}
function _initSubPos(){
  const gid=el("sub-gid").value;const g=gById(gid);if(!g)return;
  const orderIdx=parseInt(el("sub-order").value||"0");
  const cur=getCurrentLineup(g);
  const curEntry=cur[orderIdx];const curM=mById(curEntry?.memberId);
  const curPos=curEntry?.gamePosition||curM?.position||"投手";
  const posSel=el("sub-pos");
  if(posSel){
    // curPosがDETAILPOS外なら先頭にoption追加
    if(!DETAILPOS.includes(curPos)&&!posSel.querySelector(`option[value="${CSS.escape(curPos)}"]`)){
      const opt=document.createElement("option");opt.value=curPos;opt.textContent=`${curPos}（${PPOS[curPos]||curPos}）`;
      posSel.insertBefore(opt,posSel.firstChild);
    }
    posSel.value=curPos;
  }
  // 守備位置をセットしてから警告判定（同じ位置なら警告なし）
  checkShiftWarn();
}
function setSubType(t){
  const defs={
    ph:{bg:"#fdecea",c:"#c0392b",b:"#c0392b",txt:"<b>代打：</b>打順の選手を控えの選手に交代します。"},
    pr:{bg:"#e8f5e9",c:"#1e8449",b:"#1e8449",txt:"<b>代走：</b>走者を控えの選手に交代します。"},
    def:{bg:"#e8f0fb",c:"#1a5276",b:"#1a5276",txt:"<b>守備交代：</b>打順はそのままで守備のみ控えの選手に交代します。"},
    shift:{bg:"#fff8e6",c:"#d35400",b:"#d35400",txt:"<b>シフト変更：</b>出場中の全選手の守備位置を一括変更します。"}
  };
  const d=defs[t]||defs.ph;
  const desc=el("sub-desc");if(desc){desc.style.background=d.bg;desc.style.color=d.c;desc.style.borderLeftColor=d.b;desc.innerHTML=d.txt;}
  ["ph","pr","def","shift"].forEach(x=>{const btn=el("sub-t-"+x);if(!btn)return;btn.style.background=x===t?d.bg:"#f0f2f5";btn.style.color=x===t?d.c:"#6b7a8d";btn.style.borderBottomColor=x===t?d.b:"transparent";});
  const isShift=t==="shift";
  // 各行の表示制御
  el("sub-order-row").style.display=isShift?"":"";  // 常に表示（shiftは行単位でgridを使うので非表示）
  if(isShift){
    el("sub-order-row").style.display="none";
    el("sub-new-row").style.display="none";
    el("sub-pos-row").style.display="none";
    el("sub-shift-row").style.display="";
    el("sub-shift-warn").style.display="none";
  } else {
    el("sub-order-row").style.display="";
    el("sub-new-row").style.display="";
    el("sub-pos-row").style.display=t==="pr"?"none":"";
    el("sub-shift-row").style.display="none";
    el("sub-shift-warn").style.display="none";
  }
  el("sub-modal")._type=t;
  const ol=el("sub-order-lbl"),nl=el("sub-new-lbl");
  if(ol)ol.textContent=t==="pr"?"代走対象（現在いる打順）":t==="def"?"守備を外す選手（打順）":"交代する打順";
  if(nl)nl.textContent=t==="pr"?"代走に入る選手":t==="def"?"守備に入る選手":"新しい選手";
}
function subOrderChange(){
  // 打順が変わったら守備位置を交代される選手に合わせて初期設定
  _initSubPos();
}
function subNewChange(){
  // 新しい選手のデフォルト守備位置を交代される選手のポジションに設定
  // （新しい選手の本来のポジションではなく、そのポジションに入るのが通常）
  checkShiftWarn();
}
function checkShiftWarn(){
  const t=el("sub-modal")?._type;
  const warn=el("sub-shift-warn");
  if(!warn){return;}
  // 代走・シフト変更は守備位置変更の概念なし → 常に非表示
  if(t!=="ph"&&t!=="def"){warn.style.display="none";return;}
  const gid=el("sub-gid").value;const g=gById(gid);if(!g){warn.style.display="none";return;}
  const orderIdx=parseInt(el("sub-order").value||"0");
  const cur=getCurrentLineup(g);
  const curEntry=cur[orderIdx];const curM=mById(curEntry?.memberId);
  const outPos=curEntry?.gamePosition||curM?.position||"";
  const selectedPos=el("sub-pos")?.value||"";
  const desc=el("sub-shift-desc");
  // 守備位置が異なる場合のみ警告（「控え」への変更は警告不要）
  if(desc&&outPos&&selectedPos&&outPos!==selectedPos&&selectedPos!=="控え"){
    desc.textContent=`${outPos}（${PPOS[outPos]||outPos}）→ ${selectedPos}（${PPOS[selectedPos]||selectedPos}）の守備変更が発生します。`;
    warn.style.display="";
  } else {
    warn.style.display="none";
  }
}
function saveSub(){
  const gid=el("sub-gid").value;const g=gById(gid);if(!g)return;
  const t=el("sub-modal")?._type||"ph";const lv=V.sb;

  // ── シフト変更（出場中全員の守備位置一括変更）
  // lineupは変えず、シフト変更も substitutions に記録
  if(t==="shift"){
    if(!g.scorebook.substitutions)g.scorebook.substitutions=[];
    const cur=getCurrentLineup(g);
    document.querySelectorAll("[data-ti]").forEach(s=>{
      const orderIdx=parseInt(s.getAttribute("data-ti"));
      const newPos=s.value;
      const entry=cur[orderIdx];if(!entry)return;
      const m=mById(entry.memberId);
      if(entry.gamePosition!==newPos){
        g.scorebook.substitutions.push({
          inning:lv.inning,half:lv.half,type:"shift",
          outPlayer:entry.memberId,outName:m?.name||"?",
          inPlayer:entry.memberId,inName:m?.name||"?",
          order:orderIdx+1,position:newPos
        });
      }
    });
    saveS();el("sub-modal").style.display="none";renderScreen();return;
  }

  const orderIdx=parseInt(el("sub-order").value);
  const rawMid=el("sub-nm").value;const newMid=isNaN(rawMid)?rawMid:Number(rawMid);
  if(!newMid){alert("選手を選んでください");return;}

  const cur=getCurrentLineup(g);
  const curEntry=cur[orderIdx];if(!curEntry){el("sub-modal").style.display="none";return;}
  const pos=t==="pr"?(curEntry.gamePosition||"控え"):el("sub-pos").value;

  if(!g.scorebook.substitutions)g.scorebook.substitutions=[];
  const oldM=mById(curEntry.memberId);
  const newM=mById(newMid);

  // substitutionsに交代記録を追加するだけ。g.lineupは変更しない
  g.scorebook.substitutions.push({
    inning:lv.inning,half:lv.half,type:t,
    outPlayer:curEntry.memberId,outName:oldM?.name||"?",
    inPlayer:newMid,inName:newM?.name||"?",
    order:orderIdx+1,position:pos
  });

  saveS();el("sub-modal").style.display="none";renderScreen();
}

// ─── INIT ─────────────────────────────────────────────────
loadS();
// ローカルデータで即座に描画（空でも表示。スマホで空白にならないよう）
render();
// GAS設定済みならJSONP経由でクラウドから取得して再描画
if(GAS_URL){ loadFromCloud(); }

</script>
